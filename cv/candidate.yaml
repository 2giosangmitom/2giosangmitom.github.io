projects:
  - name: Portfolio Website
    description: My portfolio showcases my skills, features my CV written in Typst, highlights my projects, and includes my blog.
    detailed:
      - Designed and developed the entire site from scratch with a clean and professional layout.
      - Implemented responsive design with a mobile-first approach for faster loading on mobile devices.
      - Integrated a professional CV written in Typst, ensuring all sections are easily navigable.
      - Optimized the website for SEO to improve visibility on search engines.
    technologies:
      - Vue.js
      - Nuxt.js
      - Sass
      - Typst
      - VueUse
    links:
      github: https://github.com/2giosangmitom/2giosangmitom.github.io
      preview: https://2giosangmitom.is-a.dev/
  - name: Year Progress
    description: A website for tracking the progress of the current year visually.
    detailed:
      - Built the application to display the percentage of the year that has passed with real-time updates and a visually appealing progress bar.
      - Used TypeScript for type safety and improved code quality.
      - Optimized the performance of the application to ensure it loads quickly and runs smoothly.
      - Implemented a dark theme toggle with Pinia and Tailwind.
      - Ensured accurate progress calculation.
      - Wrote unit tests with Vitest.
    technologies:
      - Vue.js
      - Nuxt.js
      - Pinia
      - TypeScript
      - Vitest
      - Tailwind CSS
    links:
      github: https://github.com/2giosangmitom/year-progress
      preview: https://year-progress-kappa.vercel.app/
  - name: Meme Generator
    description: A website that generates a random meme when the user clicks.
    detailed:
      - Developed an application that generates a random meme when the user clicks a button.
      - Stored memes in Firebase storage.
      - Used Pinia to manage application state.
      - Integrated Firebase with Nuxt.js using VueFire.
      - Set up GitHub Actions for automatic deployment to Firebase Hosting.
    technologies:
      - Vue.js
      - Nuxt.js
      - Pinia
      - TypeScript
      - VueFire
      - Firebase
    links:
      github: https://github.com/2giosangmitom/meme-generator
      preview: https://meme-generator-52ac0.web.app/
  - name: Fylo Dark Theme Landing Page
    description: A landing page challenge from Frontend Mentor.
    detailed:
      - Implemented the UI according to the provided design.
      - Ensured cross-browser compatibility and maintained consistent design across different screen sizes.
      - Reduced load times and enhanced performance by optimizing images, minifying CSS and JavaScript files, and using lazy loading techniques.
    technologies:
      - Vue.js
      - Nuxt.js
      - Sass
    links:
      github: https://github.com/2giosangmitom/fylo-landing-page
      preview: https://fylo-landing-page-two-rho.vercel.app/

